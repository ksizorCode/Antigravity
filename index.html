<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | IA Práctica con Antigravity</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #10b981;
            --table-row-hover: rgba(255, 255, 255, 0.05);
        }

        body.light-mode {
            --bg-dark: #f1f5f9;
            --bg-card: rgba(255, 255, 255, 0.8);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --glass-border: rgba(0, 0, 0, 0.1);
            --table-row-hover: rgba(0, 0, 0, 0.02);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(79, 70, 229, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(129, 140, 248, 0.1) 0%, transparent 50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            max-width: 800px;
            margin-top: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary-light), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Toolbar Styles */
        .toolbar {
            width: 100%;
            max-width: 1200px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            background: var(--bg-card);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            align-items: center;
        }

        .search-box {
            flex: 2;
            min-width: 250px;
        }

        .search-box input, .filter-select {
            width: 100%;
            background: rgba(15, 23, 42, 0.1);
            border: 1px solid var(--glass-border);
            padding: 10px 15px;
            border-radius: 12px;
            color: var(--text-main);
            font-family: inherit;
            outline: none;
            font-size: 0.9rem;
        }

        .filter-select {
            flex: 1;
            min-width: 160px;
            cursor: pointer;
        }

        .view-toggle {
            display: flex;
            background: rgba(15, 23, 42, 0.1);
            padding: 4px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            gap: 4px;
            flex-wrap: wrap;
        }

        .toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toggle-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .toggle-btn.active {
            background: var(--primary);
            color: white;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1200px;
        }

        /* VISTA: TARJETAS */
        .project-list {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .project-item {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* VISTA: LISTA */
        .view-lista .project-list {
            grid-template-columns: 1fr;
        }
        .view-lista .project-item {
            flex-direction: row;
            align-items: center;
            padding: 15px 24px;
        }

        /* VISTA: KANBAN */
        .kanban-board {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 20px;
        }
        .kanban-column {
            flex: 1;
            min-width: 300px;
            background: rgba(15, 23, 42, 0.05);
            border-radius: 16px;
            padding: 15px;
        }
        .kanban-column h3 {
            margin-bottom: 15px;
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--primary-light);
            text-align: center;
        }

        /* VISTA: TABLA */
        .table-container {
            width: 100%;
            overflow-x: auto;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th {
            text-align: left;
            padding: 15px;
            background: rgba(15, 23, 42, 0.1);
            color: var(--primary-light);
        }
        td {
            padding: 15px;
            border-bottom: 1px solid var(--glass-border);
        }
        tr:hover td {
            background: var(--table-row-hover);
        }

        /* Common Elements */
        .project-header { display: flex; align-items: center; gap: 12px; }
        .project-info h2 { font-size: 1.1rem; color: var(--primary-light); }
        .project-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .category-badge { font-size: 0.65rem; padding: 2px 8px; background: rgba(79, 70, 229, 0.1); border: 1px solid var(--primary-light); color: var(--primary-light); border-radius: 20px; }
        .tech-pill { font-size: 0.6rem; background: rgba(0,0,0,0.1); padding: 2px 6px; border-radius: 4px; color: var(--text-muted); border: 1px solid var(--glass-border); }
        
        .actions { display: flex; gap: 8px; margin-top: auto; }
        .btn { padding: 8px 14px; border-radius: 8px; font-weight: 600; font-size: 0.8rem; cursor: pointer; text-decoration: none; border: none; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: transparent; color: var(--text-muted); border: 1px solid var(--glass-border); }

        /* Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); z-index: 1000;
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content {
            background: var(--bg-dark); border: 1px solid var(--glass-border);
            max-width: 700px; width: 100%; max-height: 90vh; border-radius: 24px;
            overflow-y: auto; padding: 30px; position: relative; color: var(--text-main);
        }
        .close-modal { position: absolute; top: 20px; right: 20px; background: transparent; border: none; color: var(--text-muted); font-size: 2rem; cursor: pointer; }
        .prompt-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; font-family: monospace; font-size: 0.85rem; color: var(--accent); border: 1px solid var(--glass-border); margin-top: 10px; }

        /* Calendario */
        .calendar-view { background: var(--bg-card); border-radius: 16px; padding: 20px; border: 1px solid var(--glass-border); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .calendar-day { min-height: 90px; background: rgba(15, 23, 42, 0.05); border-radius: 8px; padding: 8px; font-size: 0.75rem; border: 1px solid var(--glass-border); }
        .calendar-day.header-day { min-height: auto; text-align: center; color: var(--primary-light); font-weight: bold; border: none; background: transparent; }
        .calendar-event { background: var(--primary); color: white; padding: 3px 6px; border-radius: 4px; margin-top: 4px; font-size: 0.65rem; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        @media (max-width: 950px) {
            .toolbar { flex-direction: column; align-items: stretch; }
            .search-box { width: 100%; }
        }
    </style>
</head>
<body>

    <button class="theme-toggle" id="theme-toggle" title="Cambiar modo">🌙</button>

    <header>
        <p class="subtitle">Repositorio de Proyectos</p>
        <h1>Soluciones de Negocio con IA</h1>
    </header>

    <section class="toolbar">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Buscar por título, descripción...">
        </div>
        
        <select id="cat-select" class="filter-select">
            <option value="all">Categoría: Todas</option>
        </select>

        <select id="tech-select" class="filter-select">
            <option value="all">Tecnología: Todas</option>
        </select>

        <select id="ia-select" class="filter-select">
            <option value="all">IA: Todas</option>
        </select>

        <div class="view-toggle">
            <button class="toggle-btn" data-view="lista">
                <svg viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
                Lista
            </button>
            <button class="toggle-btn active" data-view="cards">
                <svg viewBox="0 0 24 24"><path d="M4 4h7v7H4zm9 0h7v7h-7zM4 13h7v7H4zm9 0h7v7h-7z"/></svg>
                Tarjetas
            </button>
            <button class="toggle-btn" data-view="kanban">
                <svg viewBox="0 0 24 24"><path d="M4 4h4v16H4zm7 0h4v10h-4zm7 0h4v16h-4z"/></svg>
                Kanban
            </button>
            <button class="toggle-btn" data-view="tabla">
                <svg viewBox="0 0 24 24"><path d="M4 4v16h16V4H4zm14 14H6V10h12v8zM18 8H6V6h12v2z"/></svg>
                Tabla
            </button>
            <button class="toggle-btn" data-view="calendar">
                <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10z"/></svg>
                Calendario
            </button>
        </div>
    </section>

    <main class="dashboard-container" id="main-container">
        <!-- El contenido se genera dinámicamente -->
    </main>

    <!-- Modal Detalle -->
    <div id="project-modal" class="modal">
        <div class="modal-content">
            <button class="close-modal">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <footer style="margin-top: auto; padding: 40px 0; color: var(--text-muted); font-size: 0.8rem; text-align: center;">
        &copy; 2026 IA para Negocios — Antigravity Experience
    </footer>

    <script>
        //Esto se podría cargar de un archivo externo JSON
        const projectsData = [
            {
                "title": "Cines Manolito",
                "subtitulo": "Miércoles 08 de Abril — Día 02",
                "date": "2026-04-08",
                "description": "Web de cartelera para un pequeño cine con diseño premium.",
                "longdesk": "Una solución completa para gestión de cartelera cinematográfica. Incluye maquetación responsive, sistema de filtros por género y una estética inspirada en plataformas de streaming modernas.",
                "url": "01_cine/index.html",
                "categoria": "App",
                "tecnologías": ["HTML", "CSS", "JS"],
                "iA": "Google Gemini",
                "prompt": "Crea una web de cine moderna con colores oscuros y tarjetas elegantes para las películas...",
                "doc": "https://github.com/ksizorCode/cine-manolito",
                "emoji": "🎬"
            },
            {
                "title": "Restaurante Mejicano",
                "subtitulo": "Lunes 13 de Abril — Día 03",
                "date": "2026-04-13",
                "description": "Web de restaurante mejicano con menú interactivo.",
                "longdesk": "Proyecto enfocado en la experiencia de usuario (UX) para hostelería. Presenta un menú visualmente atractivo con animaciones suaves.",
                "url": "02_RestauranteMejicano/index.html",
                "categoria": "En Clase",
                "tecnologías": ["HTML", "Tailwind"],
                "iA": "Claude 3.5",
                "prompt": "Genera el código para una landing page de un restaurante mejicano llamado 'El Taco Feliz'...",
                "doc": "https://github.com/ksizorCode/mexican-rest",
                "emoji": "🌮"
            },
            {
                "title": "Dashboard BoxOffice Fantasy",
                "subtitulo": "Viernes 17 de Abril",
                "date": "2026-04-17",
                "description": "Panel con recaudación de películas de fantasía",
                "longdesk": "Un dashboard analítico que simula la recaudación en taquilla de universos de fantasía. Utiliza gráficos dinámicos.",
                "url": "99_Ejemplos_resultones/dashboard_fantasyMovie.html",
                "categoria": "App",
                "tecnologías": ["HTML", "CSS", "JS"],
                "iA": "Google Gemini",
                "prompt": "Crea un panel administrativo estilo fantástico con barras de progreso brillantes...",
                "doc": "https://github.com/ksizorCode/boxoffice-fantasy",
                "emoji": "🧙‍♂️"
            },
                     {
                "title": "Dashboard F1 v1",
                "subtitulo": "Viernes 17 de Abril",
                "date": "2026-04-17",
                "description": "Datos Formula uno temporada 2025",
                "longdesk": "Dashboard simple donde se muestra información sobre la temporada.",
                "url": "99_Ejemplos_resultones/dashboard_f1.html",
                "categoria": "App",
                "tecnologías": ["HTML", "CSS", "JS","chart.js"],
                "iA": "Google Gemini",
                "prompt": "",
                "doc": "",
                "emoji": "🏎"
            },
                  {
                "title": "Dashboard F1 v2",
                "subtitulo": "Viernes 17 de Abril",
                "date": "2026-04-17",
                "description": "Dashboard interactivo F1",
                "longdesk": "Dashboard interactivo por pestañas con más info del mundo de la F1",
                "url": "99_Ejemplos_resultones/dashboard_f1.html",
                "categoria": "App",
                "tecnologías": ["HTML", "CSS", "JS","chart.js"],
                "iA": "Google Gemini",
                "prompt": "",
                "doc": "",
                "emoji": "🏎"
            },
        ];

        let currentView = 'cards';
        let filters = { search: '', cat: 'all', tech: 'all', ia: 'all' };

        function init() {
            populateFilters();
            setupEventListeners();
            render();
        }

        function populateFilters() {
            const catSelect = document.getElementById('cat-select');
            const techSelect = document.getElementById('tech-select');
            const iaSelect = document.getElementById('ia-select');
            
            const cats = [...new Set(projectsData.map(p => p.categoria))];
            const techs = [...new Set(projectsData.flatMap(p => p.tecnologías))];
            const ias = [...new Set(projectsData.map(p => p.iA))];

            cats.forEach(c => catSelect.innerHTML += `<option value="${c}">${c}</option>`);
            techs.forEach(t => techSelect.innerHTML += `<option value="${t}">${t}</option>`);
            ias.forEach(ia => iaSelect.innerHTML += `<option value="${ia}">${ia}</option>`);
        }

        function setupEventListeners() {
            document.getElementById('search-input').addEventListener('input', e => { filters.search = e.target.value; render(); });
            document.getElementById('cat-select').addEventListener('change', e => { filters.cat = e.target.value; render(); });
            document.getElementById('tech-select').addEventListener('change', e => { filters.tech = e.target.value; render(); });
            document.getElementById('ia-select').addEventListener('change', e => { filters.ia = e.target.value; render(); });

            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelector('.toggle-btn.active').classList.remove('active');
                    btn.classList.add('active');
                    currentView = btn.dataset.view;
                    render();
                });
            });

            document.getElementById('theme-toggle').addEventListener('click', () => {
                document.body.classList.toggle('light-mode');
                document.getElementById('theme-toggle').textContent = document.body.classList.contains('light-mode') ? '☀️' : '🌙';
            });

            document.querySelector('.close-modal').onclick = () => document.getElementById('project-modal').style.display = 'none';
        }

        function getFiltered() {
            return projectsData.filter(p => {
                const s = filters.search.toLowerCase();
                const matchSearch = p.title.toLowerCase().includes(s) || p.description.toLowerCase().includes(s);
                const matchCat = filters.cat === 'all' || p.categoria === filters.cat;
                const matchTech = filters.tech === 'all' || p.tecnologías.includes(filters.tech);
                const matchIa = filters.ia === 'all' || p.iA === filters.ia;
                return matchSearch && matchCat && matchTech && matchIa;
            });
        }

        function showModal(title) {
            const p = projectsData.find(x => x.title === title);
            const body = document.getElementById('modal-body');
            body.innerHTML = `
                <div class="project-header" style="margin-bottom: 20px;">
                    <span style="font-size: 3rem;">${p.emoji}</span>
                    <div>
                        <h2>${p.title}</h2>
                        <p style="color: var(--text-muted);">${p.subtitulo}</p>
                    </div>
                </div>
                <div style="margin-bottom: 20px;">
                    <h4 style="color: var(--primary-light); margin-bottom: 5px; font-size: 0.8rem; text-transform: uppercase;">Descripción Detallada</h4>
                    <p style="line-height: 1.6;">${p.longdesk}</p>
                </div>
                <div style="margin-bottom: 20px;">
                    <h4 style="color: var(--primary-light); margin-bottom: 5px; font-size: 0.8rem; text-transform: uppercase;">Inteligencia Artificial (${p.iA})</h4>
                    <div class="prompt-box">${p.prompt}</div>
                </div>
                <div style="display:flex; gap: 10px; margin-top: 30px;">
                    <a href="${p.url}" class="btn btn-primary" target="_blank">Abrir Proyecto</a>
                    <a href="${p.doc}" class="btn btn-secondary" target="_blank">Repositorio</a>
                </div>
            `;
            document.getElementById('project-modal').style.display = 'flex';
        }

        function render() {
            const data = getFiltered();
            const container = document.getElementById('main-container');
            container.className = `dashboard-container view-${currentView}`;
            container.innerHTML = '';

            if (currentView === 'cards' || currentView === 'lista') {
                const ul = document.createElement('ul');
                ul.className = 'project-list';
                ul.innerHTML = data.map(p => `
                    <li class="project-item">
                        <div class="project-info">
                            <div class="project-meta">
                                <span class="category-badge">${p.categoria}</span>
                                ${p.tecnologías.map(t => `<span class="tech-pill">${t}</span>`).join('')}
                                <span class="tech-pill" style="border-color: var(--accent); color: var(--accent)">${p.iA}</span>
                            </div>
                            <div class="project-header">
                                <span>${p.emoji}</span>
                                <h2>${p.title}</h2>
                            </div>
                            <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 5px;">${p.description}</p>
                        </div>
                        <div class="actions">
                            <button class="btn btn-secondary" onclick="showModal('${p.title}')">Saber Más</button>
                            <a href="${p.url}" class="btn btn-primary">Ver Proyecto</a>
                        </div>
                    </li>
                `).join('');
                container.appendChild(ul);
            } 
            else if (currentView === 'kanban') {
                const board = document.createElement('div');
                board.className = 'kanban-board';
                const groups = [...new Set(projectsData.map(p => p.categoria))];
                groups.forEach(cat => {
                    const col = document.createElement('div');
                    col.className = 'kanban-column';
                    const items = data.filter(p => p.categoria === cat);
                    col.innerHTML = `<h3>${cat}</h3>`;
                    items.forEach(p => {
                        col.innerHTML += `
                            <div class="project-item" style="margin-bottom: 15px; padding: 15px;">
                                <div class="project-header"><span>${p.emoji}</span> <h2>${p.title}</h2></div>
                                <div style="font-size: 0.7rem; color: var(--text-muted); margin-top: 5px;">${p.iA}</div>
                                <button class="btn btn-secondary" style="width: 100%; margin-top: 10px;" onclick="showModal('${p.title}')">Detalles</button>
                            </div>
                        `;
                    });
                    board.appendChild(col);
                });
                container.appendChild(board);
            }
            else if (currentView === 'tabla') {
                const tableWrap = document.createElement('div');
                tableWrap.className = 'table-container';
                tableWrap.innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Proyecto</th>
                                <th>Categoría</th>
                                <th>Tecnologías</th>
                                <th>IA Utilizada</th>
                                <th>Fecha</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.map(p => `
                                <tr>
                                    <td><strong>${p.emoji} ${p.title}</strong></td>
                                    <td><span class="category-badge">${p.categoria}</span></td>
                                    <td>${p.tecnologías.join(', ')}</td>
                                    <td style="color: var(--accent)">${p.iA}</td>
                                    <td style="font-size: 0.8rem;">${p.date}</td>
                                    <td><button class="btn btn-secondary" onclick="showModal('${p.title}')">Ver</button></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                container.appendChild(tableWrap);
            }
            else if (currentView === 'calendar') {
                const cal = document.createElement('div');
                cal.className = 'calendar-view';
                const days = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
                let html = `<div class="calendar-grid">`;
                html += days.map(d => `<div class="calendar-day header-day">${d}</div>`).join('');
                const offset = 3; // Abril 2026 empieza Miércoles
                for (let i = 0; i < offset; i++) html += `<div class="calendar-day" style="opacity:0.2"></div>`;
                for (let d = 1; d <= 30; d++) {
                    const dateStr = `2026-04-${d.toString().padStart(2, '0')}`;
                    const events = data.filter(p => p.date === dateStr);
                    html += `
                        <div class="calendar-day">
                            <strong>${d}</strong>
                            ${events.map(e => `<div class="calendar-event" onclick="showModal('${e.title}')">${e.emoji} ${e.title}</div>`).join('')}
                        </div>
                    `;
                }
                html += `</div>`;
                cal.innerHTML = html;
                container.appendChild(cal);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
