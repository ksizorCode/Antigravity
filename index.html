<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | IA Práctica con Antigravity</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(79, 70, 229, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(129, 140, 248, 0.1) 0%, transparent 50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            max-width: 800px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Toolbar Styles */
        .toolbar {
            width: 100%;
            max-width: 1000px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            background: var(--bg-card);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            align-items: center;
        }

        .search-box {
            flex: 2;
            min-width: 200px;
        }

        .search-box input, .filter-select {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            padding: 10px 15px;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }

        .filter-select {
            flex: 1;
            min-width: 150px;
            cursor: pointer;
        }

        .filter-select option {
            background: var(--bg-dark);
        }

        .view-toggle {
            display: flex;
            background: rgba(15, 23, 42, 0.6);
            padding: 5px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        .toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        .toggle-btn.active {
            background: var(--bg-card);
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .dashboard-container {
            width: 100%;
            max-width: 1000px;
        }

        /* Cards View */
        .project-list {
            list-style: none;
            display: grid;
            gap: 20px;
        }

        .project-item {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(12px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .project-item:hover {
            transform: translateY(-5px);
            border-color: var(--primary-light);
            background: rgba(30, 41, 59, 0.9);
        }

        .project-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 4px;
        }

        .project-info h2 {
            font-size: 1.25rem;
            color: var(--primary-light);
        }

        .project-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .project-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .category-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            background: rgba(79, 70, 229, 0.2);
            border: 1px solid var(--primary-light);
            color: var(--primary-light);
            border-radius: 20px;
            font-weight: 600;
        }

        .tech-pill {
            font-size: 0.65rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--text-muted);
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-light);
            transform: scale(1.05);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--glass-border);
        }

        .btn-secondary:hover {
            border-color: var(--text-main);
            color: var(--text-main);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #1e293b;
            border: 1px solid var(--glass-border);
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            border-radius: 24px;
            overflow-y: auto;
            padding: 30px;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 20px; right: 20px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 2rem;
            cursor: pointer;
        }

        .modal-section { margin-bottom: 25px; }
        .modal-section h3 { color: var(--primary-light); margin-bottom: 10px; font-size: 1rem; text-transform: uppercase; }
        .prompt-box { background: #0f172a; padding: 15px; border-radius: 12px; font-family: monospace; font-size: 0.9rem; color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }

        /* Calendar View Styles */
        .calendar-view {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            display: none;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .calendar-day {
            min-height: 100px;
            border: 1px solid rgba(255,255,255,0.05);
            background: rgba(15, 23, 42, 0.4);
            border-radius: 8px;
            padding: 8px;
            font-size: 0.8rem;
        }

        .calendar-day.header-day { min-height: auto; text-align: center; font-weight: 600; color: var(--primary-light); background: transparent; border: none; }

        .calendar-event {
            background: var(--primary);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            margin-top: 5px;
            font-size: 0.7rem;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @media (max-width: 800px) {
            .project-item { flex-direction: column; align-items: stretch; }
            .toolbar { flex-direction: column; }
            .actions { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="decor decor-1"></div>
    <div class="decor decor-2"></div>

    <header>
        <p class="subtitle">Proyectos y Prácticas</p>
        <h1>51148 IA práctica para crear soluciones de negocio con Antigravity</h1>
    </header>

    <section class="toolbar">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Buscar proyecto o descripción...">
        </div>
        
        <select id="cat-select" class="filter-select">
            <option value="all">Categorías: Todas</option>
        </select>

        <select id="tech-select" class="filter-select">
            <option value="all">Tecnologías: Todas</option>
        </select>

        <select id="ia-select" class="filter-select">
            <option value="all">IA: Todas</option>
        </select>

        <div class="view-toggle">
            <button class="toggle-btn active" id="btn-cards">Cards</button>
            <button class="toggle-btn" id="btn-calendar">Calendar</button>
        </div>
    </section>

    <main class="dashboard-container">
        <ul id="project-list" class="project-list"></ul>
        <div id="calendar-view" class="calendar-view">
            <div class="calendar-grid" id="calendar-grid"></div>
        </div>
    </main>

    <!-- Modal Detalle -->
    <div id="project-modal" class="modal">
        <div class="modal-content">
            <button class="close-modal">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <footer style="margin-top: auto; padding: 40px 0; color: var(--text-muted); font-size: 0.9rem; text-align: center;">
        &copy; 2026 Inteligencia Artificial Aplicada a Negocios
    </footer>

    <script>
        const projectsData = [
            {
                "title": "Cines Manolito",
                "subtitulo": "Miércoles 08 de Abril — Día 02",
                "date": "2026-04-08",
                "description": "Web de cartelera para un pequeño cine con diseño premium.",
                "longdesk": "Una solución completa para gestión de cartelera cinematográfica. Incluye <b>maquetación responsive</b>, sistema de filtros por género y una estética inspirada en plataformas de streaming modernas.",
                "url": "01_cine/index.html",
                "categoria": "App",
                "tecnologías": ["HTML", "CSS", "JS"],
                "iA": "Google Gemini",
                "prompt": "Crea una web de cine moderna con colores oscuros y tarjetas elegantes para las películas...",
                "doc": "https://github.com/ksizorCode/cine-manolito",
                "emoji": "🎬",
                "refLinks": ["Documentación de UI", "Paleta de colores"]
            },
            {
                "title": "Restaurante Mejicano",
                "subtitulo": "Lunes 13 de Abril — Día 03",
                "date": "2026-04-13",
                "description": "Web de restaurante mejicano con menú interactivo.",
                "longdesk": "Proyecto enfocado en la experiencia de usuario (UX) para hostelería. Presenta un menú visualmente atractivo con animaciones suaves y optimización para dispositivos móviles.",
                "url": "02_RestauranteMejicano/index.html",
                "categoria": "En Clase",
                "tecnologías": ["HTML", "Tailwind"],
                "iA": "Claude 3.5",
                "prompt": "Genera el código para una landing page de un restaurante mejicano llamado 'El Taco Feliz'...",
                "doc": "https://github.com/ksizorCode/mexican-rest",
                "emoji": "🌮",
                "video": "https://youtube.com/watch?v=demo-rest"
            },
            {
                "title": "Dashboard BoxOffice Fantasy Movies",
                "subtitulo": "Viernes 17 de Abril",
                "date": "2026-04-17",
                "description": "Panel con recaudación de películas de fantasía",
                "longdesk": "Un dashboard analítico que simula la recaudación en taquilla de universos de fantasía. Utiliza <b>gráficos dinámicos</b> y una interfaz mágica.",
                "url": "99_Ejemplos_resultones/dashboard_fantasyMovie.html",
                "categoria": "App",
                "tecnologías": ["HTML", "CSS", "JS"],
                "iA": "Google Gemini",
                "prompt": "Crea un panel administrativo estilo fantástico con barras de progreso brillantes y fuentes góticas...",
                "doc": "https://github.com/ksizorCode/boxoffice-fantasy",
                "emoji": "🧙‍♂️"
            }
        ];

        let filters = { search: '', cat: 'all', tech: 'all', ia: 'all' };
        let currentView = 'cards';

        function initToolbar() {
            const populate = (id, key, label) => {
                const select = document.getElementById(id);
                let items = [];
                projectsData.forEach(p => {
                    if(Array.isArray(p[key])) items.push(...p[key]);
                    else items.push(p[key]);
                });
                [...new Set(items)].forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item;
                    opt.textContent = item;
                    select.appendChild(opt);
                });
                select.addEventListener('change', (e) => { filters[key === 'tecnologías' ? 'tech' : key === 'iA' ? 'ia' : 'cat'] = e.target.value; render(); });
            };
            
            populate('cat-select', 'categoria');
            populate('tech-select', 'tecnologías');
            populate('ia-select', 'iA');

            document.getElementById('search-input').addEventListener('input', (e) => {
                filters.search = e.target.value;
                render();
            });
        }

        function getFiltered() {
            return projectsData.filter(p => {
                const mSearch = p.title.toLowerCase().includes(filters.search.toLowerCase()) || p.description.toLowerCase().includes(filters.search.toLowerCase());
                const mCat = filters.cat === 'all' || p.categoria === filters.cat;
                const mTech = filters.tech === 'all' || (Array.isArray(p.tecnologías) ? p.tecnologías.includes(filters.tech) : p.tecnologías === filters.tech);
                const mIa = filters.ia === 'all' || p.iA === filters.ia;
                return mSearch && mCat && mTech && mIa;
            });
        }

        function showModal(title) {
            const p = projectsData.find(x => x.title === title);
            const body = document.getElementById('modal-body');
            body.innerHTML = `
                <div class="project-header" style="margin-bottom: 20px;">
                    <span style="font-size: 3rem;">${p.emoji}</span>
                    <div>
                        <h2 style="color: var(--primary-light);">${p.title}</h2>
                        <p style="color: var(--text-muted);">${p.subtitulo}</p>
                    </div>
                </div>
                <div class="modal-section">
                    <h3>Descripción</h3>
                    <p style="line-height: 1.6;">${p.longdesk || p.description}</p>
                </div>
                <div class="modal-section">
                    <h3>Inteligencia Artificial</h3>
                    <p><b>Modelo:</b> ${p.iA}</p>
                    <div style="margin-top:10px;">
                        <b>Prompt utilizado:</b>
                        <div class="prompt-box">${p.prompt || 'No especificado'}</div>
                    </div>
                </div>
                <div class="modal-section">
                    <h3>Recursos</h3>
                    <div style="display:flex; gap: 15px; flex-wrap: wrap;">
                        <a href="${p.doc}" target="_blank" class="btn btn-secondary">📦 GitHub / Doc</a>
                        ${p.video ? `<a href="${p.video}" target="_blank" class="btn btn-secondary">📺 Ver Vídeo</a>` : ''}
                        ${p.refLinks ? p.refLinks.map(l => `<span class="category-badge">${l}</span>`).join('') : ''}
                    </div>
                </div>
            `;
            document.getElementById('project-modal').style.display = 'flex';
        }

        function renderCards(data) {
            const container = document.getElementById('project-list');
            container.style.display = 'grid';
            document.getElementById('calendar-view').style.display = 'none';
            
            container.innerHTML = data.map(p => `
                <li class="project-item">
                    <div class="project-info">
                        <div class="project-meta">
                            <span class="project-subtitle">${p.subtitulo}</span>
                            <span class="category-badge">${p.categoria}</span>
                            ${(p.tecnologías || []).map(t => `<span class="tech-pill">${t}</span>`).join('')}
                        </div>
                        <div class="project-header">
                            <span class="project-emoji">${p.emoji}</span>
                            <h2>${p.title}</h2>
                        </div>
                        <p class="project-desc">${p.description}</p>
                    </div>
                    <div class="actions">
                        <button class="btn btn-secondary" onclick="showModal('${p.title}')">Saber Más</button>
                        <a href="${p.url}" class="btn btn-primary">Ver Proyecto</a>
                    </div>
                </li>
            `).join('');
        }

        function renderCalendar(data) {
            const grid = document.getElementById('calendar-grid');
            document.getElementById('project-list').style.display = 'none';
            document.getElementById('calendar-view').style.display = 'block';

            const days = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
            let html = days.map(d => `<div class="calendar-day header-day">${d}</div>`).join('');
            const startDay = 3; // Abril 2026 empieza Miércoles
            for (let i = 0; i < startDay; i++) html += `<div class="calendar-day" style="opacity:0.1"></div>`;
            for (let day = 1; day <= 30; day++) {
                const date = `2026-04-${day.toString().padStart(2, '0')}`;
                const projects = data.filter(p => p.date === date);
                html += `<div class="calendar-day">
                    <strong>${day}</strong>
                    ${projects.map(p => `<div class="calendar-event" onclick="showModal('${p.title}')">${p.emoji} ${p.title}</div>`).join('')}
                </div>`;
            }
            grid.innerHTML = html;
        }

        function render() {
            const filtered = getFiltered();
            currentView === 'cards' ? renderCards(filtered) : renderCalendar(filtered);
        }

        // Setup
        document.addEventListener('DOMContentLoaded', () => {
            initToolbar();
            render();
            
            document.getElementById('btn-cards').addEventListener('click', () => { 
                currentView = 'cards'; 
                document.getElementById('btn-cards').classList.add('active'); 
                document.getElementById('btn-calendar').classList.remove('active'); 
                render(); 
            });
            document.getElementById('btn-calendar').addEventListener('click', () => { 
                currentView = 'calendar'; 
                document.getElementById('btn-calendar').classList.add('active'); 
                document.getElementById('btn-cards').classList.remove('active'); 
                render(); 
            });
            
            document.querySelector('.close-modal').onclick = () => document.getElementById('project-modal').style.display = 'none';
            window.onclick = (e) => { if(e.target.className === 'modal') document.getElementById('project-modal').style.display = 'none'; };
        });
    </script>
</body>
</html>
