<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lista de Clientes Premium</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Mis Clientes</h1>
            <p class="subtitle">Gestión comercial inteligente</p>
        </header>

        <main id="client-list-container">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Buscar cliente o empresa...">
            </div>
            
            <div id="clients-list" class="clients-list">
                <!-- Los clientes se cargarán aquí -->
                <div class="loader"></div>
            </div>
        </main>

        <div id="add-button" class="fab">
            <span>+</span>
        </div>

        <!-- Modal para añadir cliente -->
        <div id="modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Nuevo Cliente</h2>
                    <span class="close">&times;</span>
                </div>
                <form id="add-client-form">
                    <div class="form-group">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" required placeholder="Ej: Juan Pérez">
                    </div>
                    <div class="form-group">
                        <label for="empresa">Empresa</label>
                        <input type="text" id="empresa" placeholder="Ej: Tech Corp">
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="ejemplo@correo.com">
                    </div>
                    <div class="form-group">
                        <label for="telefono">Teléfono</label>
                        <input type="tel" id="telefono" placeholder="+34 ...">
                    </div>
                    <div class="form-group">
                        <label for="notas">Notas</label>
                        <textarea id="notas" rows="3" placeholder="Detalles adicionales..."></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Guardar Cliente</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    console.log('SW registrado', reg);
                }).catch(err => {
                    console.log('Error registro SW', err);
                });
            });
        }
    </script>
</body>
</html>
