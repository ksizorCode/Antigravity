<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima Local PWA</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(to bottom right, #1e3a8a, #3b82f6);
            min-height: 100vh;
            color: white;
        }

        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .loader {
            border-top-color: #ffffff;
            animation: spinner 1.5s linear infinite;
        }

        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Ocultar scrollbar */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-md mx-auto">
        <!-- Header & Search -->
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold mb-4">MeteoApp</h1>
            
            <div class="relative flex items-center mb-4">
                <input 
                    type="text" 
                    id="cityInput" 
                    placeholder="Buscar ciudad..." 
                    class="w-full p-3 pl-10 rounded-xl glass outline-none focus:ring-2 focus:ring-blue-300 text-white placeholder-blue-200"
                >
                <i data-lucide="search" class="absolute left-3 w-5 h-5 text-blue-200"></i>
                <button 
                    onclick="searchCity()" 
                    class="absolute right-2 bg-blue-500 hover:bg-blue-400 p-2 rounded-lg transition-colors"
                >
                    <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </div>

            <button 
                onclick="getLocation()" 
                class="flex items-center justify-center gap-2 w-full p-3 rounded-xl glass hover:bg-white/20 transition-all font-medium"
            >
                <i data-lucide="map-pin" class="w-5 h-5"></i>
                Usar mi ubicación GPS
            </button>
        </header>

        <!-- Loading State -->
        <div id="loading" class="hidden flex flex-col items-center justify-center my-20">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
            <p>Consultando los cielos...</p>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="hidden p-4 mb-6 rounded-xl bg-red-500/50 border border-red-400 text-center">
            <p id="errorText"></p>
        </div>

        <!-- Weather Display -->
        <main id="weatherInfo" class="hidden">
            <!-- Current Weather -->
            <div class="glass rounded-3xl p-8 mb-6 text-center">
                <h2 id="cityName" class="text-2xl font-semibold mb-1">Cargando...</h2>
                <p id="currentDate" class="text-blue-100 text-sm mb-6">--</p>
                
                <div class="flex justify-center mb-4">
                    <div id="weatherIconLarge" class="w-24 h-24 text-white">
                        <!-- Icono dinámico -->
                    </div>
                </div>
                
                <div class="text-6xl font-bold mb-2">
                    <span id="temp">--</span>°
                </div>
                <p id="conditionText" class="text-xl capitalize text-blue-50 mb-6">--</p>

                <!-- Details Grid -->
                <div class="grid grid-cols-3 gap-4 border-t border-white/10 pt-6">
                    <div>
                        <p class="text-xs text-blue-200 uppercase mb-1">Viento</p>
                        <p id="windSpeed" class="font-semibold text-sm">-- km/h</p>
                    </div>
                    <div>
                        <p class="text-xs text-blue-200 uppercase mb-1">Humedad</p>
                        <p id="humidity" class="font-semibold text-sm">--%</p>
                    </div>
                    <div>
                        <p class="text-xs text-blue-200 uppercase mb-1">Sensación</p>
                        <p id="feelsLike" class="font-semibold text-sm">--°</p>
                    </div>
                </div>
            </div>

            <!-- Forecast -->
            <div class="glass rounded-3xl p-6">
                <h3 class="text-lg font-semibold mb-4">Próximos 5 días</h3>
                <div id="forecastContainer" class="space-y-4">
                    <!-- Forecast items populated by JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- PWA Manifest Simulation -->
    <script>
        // Configuración de la API: Usamos Open-Meteo (Sin API Key para demostración)
        // Y Nominatim para geocodificación inversa
        
        const API_URL = "https://api.open-meteo.com/v1/forecast";
        const GEO_URL = "https://nominatim.openstreetmap.org/search";
        const REVERSE_GEO_URL = "https://nominatim.openstreetmap.org/reverse";

        const weatherCodes = {
            0: { label: 'Despejado', icon: 'sun' },
            1: { label: 'Principalmente despejado', icon: 'cloud-sun' },
            2: { label: 'Parcialmente nublado', icon: 'cloud-sun' },
            3: { label: 'Nublado', icon: 'cloud' },
            45: { label: 'Niebla', icon: 'cloud-fog' },
            48: { label: 'Niebla de escarcha', icon: 'cloud-fog' },
            51: { label: 'Drizna ligera', icon: 'cloud-drizzle' },
            61: { label: 'Lluvia ligera', icon: 'cloud-rain' },
            63: { label: 'Lluvia moderada', icon: 'cloud-rain' },
            65: { label: 'Lluvia fuerte', icon: 'cloud-rain' },
            71: { label: 'Nieve ligera', icon: 'cloud-snow' },
            95: { label: 'Tormenta', icon: 'cloud-lightning' }
        };

        window.onload = () => {
            lucide.createIcons();
            // Intentar obtener ubicación inicial
            getLocation();
        };

        async function getLocation() {
            showLoading(true);
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    position => {
                        const { latitude, longitude } = position.coords;
                        fetchWeatherData(latitude, longitude);
                    },
                    error => {
                        showError("No pudimos acceder a tu GPS. Por favor busca tu ciudad manualmente.");
                        showLoading(false);
                    }
                );
            } else {
                showError("Tu navegador no soporta geolocalización.");
                showLoading(false);
            }
        }

        async function searchCity() {
            const query = document.getElementById('cityInput').value;
            if (!query) return;

            showLoading(true);
            try {
                const response = await fetch(`${GEO_URL}?format=json&q=${encodeURIComponent(query)}&limit=1`);
                const data = await response.json();
                
                if (data.length > 0) {
                    const { lat, lon, display_name } = data[0];
                    fetchWeatherData(lat, lon, display_name.split(',')[0]);
                } else {
                    showError("No se encontró la ciudad indicada.");
                    showLoading(false);
                }
            } catch (err) {
                showError("Error al conectar con el servidor de búsqueda.");
                showLoading(false);
            }
        }

        async function fetchWeatherData(lat, lon, customName = null) {
            try {
                // Obtener nombre de ciudad si no se provee
                let cityName = customName;
                if (!cityName) {
                    const geoRes = await fetch(`${REVERSE_GEO_URL}?format=json&lat=${lat}&lon=${lon}`);
                    const geoData = await geoRes.json();
                    cityName = geoData.address.city || geoData.address.town || geoData.address.village || "Tu ubicación";
                }

                // Llamada a Open-Meteo
                const weatherRes = await fetch(`${API_URL}?latitude=${lat}&longitude=${lon}&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto&hourly=relative_humidity_2m,apparent_temperature`);
                const weatherData = await weatherRes.json();

                updateUI(weatherData, cityName);
            } catch (err) {
                showError("Hubo un error al obtener el clima.");
            } finally {
                showLoading(false);
            }
        }

        function updateUI(data, cityName) {
            document.getElementById('weatherInfo').classList.remove('hidden');
            document.getElementById('errorMessage').classList.add('hidden');
            
            const current = data.current_weather;
            const daily = data.daily;
            
            // Info principal
            document.getElementById('cityName').innerText = cityName;
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
            document.getElementById('temp').innerText = Math.round(current.temperature);
            
            const codeInfo = weatherCodes[current.weathercode] || { label: 'Desconocido', icon: 'cloud' };
            document.getElementById('conditionText').innerText = codeInfo.label;
            
            // Icono principal
            const iconContainer = document.getElementById('weatherIconLarge');
            iconContainer.innerHTML = `<i data-lucide="${codeInfo.icon}" class="w-full h-full"></i>`;
            
            // Detalles adicionales
            document.getElementById('windSpeed').innerText = `${current.windspeed} km/h`;
            document.getElementById('humidity').innerText = `${data.hourly.relative_humidity_2m[0]}%`;
            document.getElementById('feelsLike').innerText = `${Math.round(data.hourly.apparent_temperature[0])}°`;

            // Pronóstico
            const forecastContainer = document.getElementById('forecastContainer');
            forecastContainer.innerHTML = '';
            
            for (let i = 1; i < 6; i++) {
                const dayCode = daily.weathercode[i];
                const dayInfo = weatherCodes[dayCode] || { label: 'N/A', icon: 'cloud' };
                const date = new Date(daily.time[i]);
                const dayName = date.toLocaleDateString('es-ES', { weekday: 'short' });

                const forecastHtml = `
                    <div class="flex items-center justify-between">
                        <p class="w-12 font-medium capitalize">${dayName}</p>
                        <div class="flex items-center gap-2 flex-1 px-4">
                            <i data-lucide="${dayInfo.icon}" class="w-5 h-5 text-blue-200"></i>
                            <p class="text-sm text-blue-100">${dayInfo.label}</p>
                        </div>
                        <div class="flex gap-3 text-sm">
                            <span class="font-bold">${Math.round(daily.temperature_2m_max[i])}°</span>
                            <span class="text-blue-300">${Math.round(daily.temperature_2m_min[i])}°</span>
                        </div>
                    </div>
                `;
                forecastContainer.insertAdjacentHTML('beforeend', forecastHtml);
            }

            lucide.createIcons();
        }

        function showLoading(state) {
            document.getElementById('loading').classList.toggle('hidden', !state);
            if (state) {
                document.getElementById('weatherInfo').classList.add('hidden');
                document.getElementById('errorMessage').classList.add('hidden');
            }
        }

        function showError(msg) {
            const errDiv = document.getElementById('errorMessage');
            document.getElementById('errorText').innerText = msg;
            errDiv.classList.remove('hidden');
            document.getElementById('weatherInfo').classList.add('hidden');
        }

        // Service Worker Placeholder para que sea PWA-ready
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // Aquí se registraría el worker si existiera un archivo externo.
                console.log('PWA Lista para ser instalada');
            });
        }
    </script>
</body>
</html>
